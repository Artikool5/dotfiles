include ./themes/mocha.conf

# Font
# font_family      FiraCode Nerd Font
font_family       Hack Nerd Font
font_size         14

confirm_os_window_close 0

copy_on_select yes
paste_actions quote-urls-at-prompt,replace-newline,confirm

initial_window_width  1040
initial_window_height 800

dynamic_background_opacity yes
background_opacity 0.75
background_blur 16

inactive_text_alpha 0.9
hide_window_decorations yes

tab_bar_style powerline
tab_activity_symbol "*"
tab_title_template "{bell_symbol}{title}"
active_tab_background #cba6f7

mouse_map right press ungrabbed mouse_select_command_output
scrollback_pager nvim --cmd 'set eventignore=FileType' +'nnoremap q ZQ' +'call nvim_open_term(0, {})' +'set nomodified nolist' +'$' +'norm G' -
scrollback_pager_history_size 50
touch_scroll_multiplier 3.0

# kitty-scrollback.nvim
allow_remote_control socket-only
listen_on unix:/tmp/kitty
action_alias kitty_scrollback_nvim kitten '/home/artem/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py'
# Browse scrollback buffer in nvim
map kitty_mod+s kitty_scrollback_nvim
# Browse output of the last shell command in nvim
map kitty_mod+p kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
# Show clicked command output in nvim
mouse_map kitty_mod+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output

shell fish
editor .


clipboard_control write-clipboard write-primary read-clipboard read-primary


# Keybindings
map kitty_mod+k     next_window
map kitty_mod+j     previous_window
map kitty_mod+enter new_window_with_cwd
map kitty_mod+f2    set_window_title

map kitty_mod+l next_tab
map kitty_mod+h previous_tab
map kitty_mod+t new_tab_with_cwd

# map kitty_mod+s show_scrollback

map kitty_mod+up   set_background_opacity +0.05
map kitty_mod+down set_background_opacity -0.05

map f10>/ goto_session ~/.config/kitty/sessions/
map f10>g goto_session ~/.config/kitty/sessions/
map f10>c close_session .
map f10>C close_session
map f10>S save_as_session --base-dir ~/.config/kitty/sessions/ --use-foreground-process
